<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chamada por Turma</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="app">
      <section class="hero">
        <p class="tag">Google Sheets + Render</p>
        <h1>Chamada por Turma</h1>
        <p class="subtitle">
          Selecione data e turma para usar <strong>Nomes</strong> (F, 1 e 2).
        </p>
      </section>

      <section class="panel controls-panel">
        <form id="filterForm" class="filters">
          <label class="field">
            <span>Data</span>
            <input id="dateInput" name="date" type="text" placeholder="23/2" />
          </label>
          <label class="field">
            <span>Turma</span>
            <select id="turmaSelect" name="turma"></select>
          </label>
          <button id="loadBtn" type="submit">Carregar chamada</button>
        </form>
        <div id="sheetInfo" class="sheet-info">Carregando...</div>
      </section>

      <section class="panel">
        <div class="panel-head">
          <h2>Alunos</h2>
          <span id="status" class="status">Aguardando...</span>
        </div>
        <ul id="studentList" class="name-list" aria-live="polite"></ul>
      </section>
    </main>

    <script>
      const statusEl = document.getElementById("status");
      const studentListEl = document.getElementById("studentList");
      const dateInputEl = document.getElementById("dateInput");
      const turmaSelectEl = document.getElementById("turmaSelect");
      const loadBtnEl = document.getElementById("loadBtn");
      const formEl = document.getElementById("filterForm");
      const sheetInfoEl = document.getElementById("sheetInfo");

      const localCellValues = new Map();
      const savingCells = new Set();
      let latestMeta = null;

      const norm = (v) => String(v || "").trim().toUpperCase();
      const cellKey = (sheet, cell) => `${sheet}|${cell}`;
      const setStatus = (text) => (statusEl.textContent = text);
      const studentCell = (student, col) => student.cell || `${col}${student.rowNumber}`;

      function getValue(sheet, cell, fallback) {
        const key = cellKey(sheet, cell);
        return localCellValues.has(key) ? norm(localCellValues.get(key)) : norm(fallback);
      }

      function getCellValue(student, data) {
        const col = data?.selected?.dateColumn?.a1Column;
        if (!col) return "";
        const sheet = data?.sheet || "Nomes";
        const cell = studentCell(student, col);
        return getValue(sheet, cell, student.currentValue);
      }

      function setLoadedStatus(data) {
        let f = 0, one = 0, two = 0, three = 0;
        for (const s of data.students || []) {
          const current = getCellValue(s, data);
          if (current === "F") f++;
          if (current === "1") one++;
          if (current === "2") two++;
          if (current === "3") three++;
        }
        setStatus(`${(data.students || []).length} aluno(s) • F:${f} • 1:${one} • 2:${two} • 3:${three}`);
      }

      function renderInfo(data) {
        const c = data.selected || {};
        const cDate = c.dateColumn
          ? `Nomes: data ${c.date} na coluna ${c.dateColumn.a1Column} (linha ${c.dateHeaderRow})`
          : `Nomes: data ${c.date || ""} nao encontrada`;
        const cTurma = c.turmaRow ? `Nomes: turma em ${c.turmaCell}` : "Nomes: turma nao encontrada";
        sheetInfoEl.innerHTML = `<div><strong>${cDate}</strong></div><div>${cTurma}</div>`;
      }

      async function saveCell(sheet, cell, value) {
        const res = await fetch("/api/chamada/marcar", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ sheet, cell, value })
        });
        let payload = null;
        try { payload = await res.json(); } catch (_e) {}
        if (!res.ok) throw new Error((payload && (payload.details || payload.error)) || "Erro ao gravar");
        return payload;
      }

      async function persistStudentCell({ sheet, cell, value, data, student, field }) {
        const key = cellKey(sheet, cell);
        if (savingCells.has(key)) return;
        savingCells.add(key);
        renderStudents(data);
        setStatus(`Salvando ${sheet} ${cell}...`);
        try {
          await saveCell(sheet, cell, value);
          localCellValues.set(key, value);
          student[field] = value;
        } catch (err) {
          window.alert(`Nao foi possivel gravar ${cell} em ${sheet}: ${err.message}`);
        } finally {
          savingCells.delete(key);
          renderStudents(data);
          setLoadedStatus(data);
        }
      }

      function toggleF(student, data) {
        const col = data?.selected?.dateColumn?.a1Column;
        if (!col) return;
        const sheet = data.sheet || "Nomes";
        const cell = studentCell(student, col);
        const next = getCellValue(student, data) === "F" ? "" : "F";
        return persistStudentCell({ sheet, cell, value: next, data, student, field: "currentValue" });
      }

      function setMarker(student, data, value) {
        const col = data?.selected?.dateColumn?.a1Column;
        if (!col) {
          window.alert("Nao foi possivel localizar a data correspondente na aba Nomes.");
          return;
        }
        const sheet = data.sheet || "Nomes";
        const cell = studentCell(student, col);
        const next = getCellValue(student, data) === value ? "" : value;
        return persistStudentCell({ sheet, cell, value: next, data, student, field: "currentValue" });
      }

      function renderStudents(data) {
        studentListEl.innerHTML = "";
        const col = data?.selected?.dateColumn?.a1Column;
        if (!data?.selected?.turmaRow) {
          const li = document.createElement("li");
          li.className = "empty";
          li.textContent = "Turma nao encontrada na aba Nomes.";
          studentListEl.appendChild(li);
          return;
        }
        if (!col) {
          const li = document.createElement("li");
          li.className = "empty";
          li.textContent = "Data nao encontrada na aba Nomes.";
          studentListEl.appendChild(li);
          return;
        }

        const students = data.students || [];
        if (!students.length) {
          const li = document.createElement("li");
          li.className = "empty";
          li.textContent = "Nenhum aluno encontrado para essa turma.";
          studentListEl.appendChild(li);
          return;
        }

        for (const [index, student] of students.entries()) {
          const li = document.createElement("li");
          li.className = "name-item student-item";
          const sheet = data.sheet || "Nomes";
          const cell = studentCell(student, col);
          const currentValue = getCellValue(student, data);
          const saving = savingCells.has(cellKey(sheet, cell));
          const fVal = currentValue;
          const nVal = currentValue;
          const tVal = currentValue;
          const fSaving = saving;
          const nSaving = saving;
          const tSaving = saving;
          const nDisabled = false;
          const tDisabled = false;

          li.innerHTML = `
            <span class="index">${index + 1}</span>
            <div class="student-main">
              <span class="text"></span>
              <small class="meta">Nomes ${cell}</small>
            </div>
            <div class="action-group">
              <button type="button" class="f-btn ${fVal === "F" ? "is-active" : ""}" ${fSaving ? "disabled" : ""}>${fSaving ? "Salvando..." : fVal === "F" ? "Falta (F)" : "Marcar F"}</button>
              <button type="button" class="num-btn ${nVal === "1" ? "is-one" : ""}" ${nDisabled || nSaving ? "disabled" : ""}>1</button>
              <button type="button" class="num-btn ${nVal === "2" ? "is-two" : ""}" ${nDisabled || nSaving ? "disabled" : ""}>2</button>
              <button type="button" class="num-btn ${tVal === "3" ? "is-three" : ""}" ${tDisabled || tSaving ? "disabled" : ""}>3</button>
            </div>
          `;

          li.querySelector(".text").textContent = student.name;
          const [fBtn, oneBtn, twoBtn, threeBtn] = li.querySelectorAll("button");
          fBtn.addEventListener("click", () => toggleF(student, data));
          oneBtn.addEventListener("click", () => !nDisabled && setMarker(student, data, "1"));
          twoBtn.addEventListener("click", () => !nDisabled && setMarker(student, data, "2"));
          threeBtn.addEventListener("click", () => !tDisabled && setMarker(student, data, "3"));
          studentListEl.appendChild(li);
        }
      }

      function syncFilters(data) {
        latestMeta = data;
        if (!turmaSelectEl.options.length) {
          turmaSelectEl.innerHTML = "";
          (data.turmaOptions || []).forEach((turma) => {
            const option = document.createElement("option");
            option.value = turma;
            option.textContent = turma;
            turmaSelectEl.appendChild(option);
          });
        }
        if (!dateInputEl.value) dateInputEl.value = data.todaySuggestion || "";
        if (data.selected?.turma) turmaSelectEl.value = data.selected.turma;
      }

      async function loadChamada() {
        loadBtnEl.disabled = true;
        setStatus("Carregando...");
        sheetInfoEl.textContent = "Consultando planilha...";
        const params = new URLSearchParams();
        if (dateInputEl.value.trim()) params.set("date", dateInputEl.value.trim());
        if (turmaSelectEl.value.trim()) params.set("turma", turmaSelectEl.value.trim());
        try {
          const res = await fetch(`/api/chamada?${params.toString()}`, { cache: "no-store" });
          const data = await res.json();
          if (!res.ok) throw new Error(data.details || data.error || "Erro ao carregar");
          syncFilters(data);
          renderInfo(data);
          renderStudents(data);
          setLoadedStatus(data);
        } catch (err) {
          studentListEl.innerHTML = "";
          const li = document.createElement("li");
          li.className = "empty";
          li.textContent = err.message;
          studentListEl.appendChild(li);
          sheetInfoEl.innerHTML = `<div class="warn">${err.message}</div>`;
          setStatus("Erro ao carregar");
        } finally {
          loadBtnEl.disabled = false;
        }
      }

      formEl.addEventListener("submit", (event) => {
        event.preventDefault();
        loadChamada();
      });

      (async function init() {
        await loadChamada();
        if (!turmaSelectEl.value && latestMeta?.turmaOptions?.length) {
          turmaSelectEl.value = latestMeta.turmaOptions[0];
        }
      })();
    </script>
  </body>
</html>
